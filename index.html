<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESTÚDIO DE BOTTONS - Gabarito Profissional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        :root { --corte: 71.2mm; --seguro: 50mm; }
        body { background: #f1f5f9; }
        #canvas-area { width: fit-content; margin: 0 auto; }
        .page { width: 210mm; height: 297mm; background: white; padding: 5mm; box-sizing: border-box; page-break-after: always; position: relative; display: flex; flex-direction: column; align-items: center; }
        .grid-container { display: grid; grid-template-columns: repeat(2, var(--corte)); grid-template-rows: repeat(4, var(--corte)); gap: 0; border: 1px solid #cbd5e1; }
        .slot { width: var(--corte); height: var(--corte); border: 1px solid #cbd5e1; position: relative; overflow: hidden; background: #f8fafc; transition: 0.3s; cursor: pointer; }
        .slot:hover { box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); border-color: #3b82f6; z-index: 10; }
        .img-wrapper { position: absolute; touch-action: none; cursor: move; z-index: 2; display: flex; align-items: center; justify-content: center; left: 0; right: 0; top: 0; bottom: 0; margin: auto; }
        .img-wrapper img { max-width: 100%; max-height: 100%; object-fit: contain; pointer-events: none; }
        .controls { position: absolute; top: 5px; right: 5px; z-index: 30; display: none; background: white; border-radius: 6px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 4px; }
        .slot:hover .controls { display: flex; gap: 4px; }
        .safe-zone { width: var(--seguro); height: var(--seguro); position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 3px dashed #f87171; pointer-events: none; z-index: 5; border-radius: 8px; }
        .click-area { position: absolute; inset: 0; z-index: 1; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="flex flex-col lg:flex-row min-h-screen">
    <aside class="w-full lg:w-80 bg-white p-6 shadow-lg z-50 overflow-y-auto border-r">
        <h1 class="text-xl font-bold mb-6 text-blue-900 uppercase tracking-tight">Estúdio de Bottons</h1>
        
        <label class="block text-sm font-medium mb-2 text-blue-900">Quantidade de Páginas</label>
        <input type="number" id="pageCount" value="1" min="1" max="10" class="w-full p-2 border rounded mb-4" onchange="renderPages()">

        <button onclick="document.getElementById('globalInput').click()" class="w-full bg-blue-900 text-white py-2 rounded-lg mb-2 hover:bg-blue-800 transition">Preencher Todos (Sincronizado)</button>
        <button onclick="clearAllSlots()" class="w-full bg-red-50 text-red-600 py-2 rounded-lg mb-4 hover:bg-red-100 transition border border-red-200">Apagar Todas Imagens</button>
        
        <div class="flex items-center justify-between py-3 border-y mb-4">
            <span class="text-sm text-blue-900 font-medium">Margem Vermelha</span>
            <input type="checkbox" id="toggleGrid" checked onchange="toggleSafeZones()" class="w-5 h-5 accent-blue-900">
        </div>

        <button id="btnPdf" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition">Baixar PDF Profissional</button>
    </aside>

    <main class="flex-1 p-8 overflow-auto flex justify-center">
        <div id="canvas-area"></div>
    </main>

    <input type="file" id="globalInput" accept="image/*" class="hidden">
    <input type="file" id="slotInput" accept="image/*" class="hidden">

    <script>
        let activeSlot = null;
        let isSyncMode = false;
        let syncedData = { width: 150, height: 150, x: 0, y: 0, src: '' };

        function renderPages() {
            const count = parseInt(document.getElementById('pageCount').value);
            const container = document.getElementById('canvas-area');
            container.innerHTML = '';
            for(let i=0; i<count; i++) {
                const page = document.createElement('div');
                page.className = 'page';
                page.innerHTML = `
                    <div class="grid-container"></div>
                    <div class="border-t border-slate-200 pt-2 text-slate-500 mt-auto w-full text-center">
                        <p class="text-[8px]">Escala 100% | Linha Cinza: Corte | Linha Vermelha: Sangria</p>
                    </div>
                `;
                const grid = page.querySelector('.grid-container');
                for(let j=0; j<8; j++) {
                    const slot = document.createElement('div');
                    slot.className = 'slot';
                    slot.innerHTML = `
                        <div class="controls">
                            <button onclick="changeZoom(this, 1.2)" class="p-1 hover:bg-gray-100 rounded text-blue-900"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg></button>
                            <button onclick="changeZoom(this, 0.8)" class="p-1 hover:bg-gray-100 rounded text-blue-900"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg></button>
                            <button onclick="clearSlot(this)" class="p-1 hover:bg-red-50 text-red-500 rounded"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>
                        </div>
                        <div class="click-area" onclick="openSlot(this.parentElement)"><span class="text-[10px] text-slate-300">Coloque sua imagem aqui</span></div>
                        <div class="safe-zone" style="display:${document.getElementById('toggleGrid').checked?'block':'none'}"></div>
                    `;
                    grid.appendChild(slot);
                }
                container.appendChild(page);
            }
        }

        function toggleSafeZones() {
            const display = document.getElementById('toggleGrid').checked ? 'block' : 'none';
            document.querySelectorAll('.safe-zone').forEach(el => el.style.display = display);
        }

        function clearAllSlots() {
            isSyncMode = false;
            document.querySelectorAll('.slot').forEach(s => {
                const img = s.querySelector('.img-wrapper');
                if(img) img.remove();
                s.querySelector('.click-area').style.display = 'flex';
            });
        }

        function openSlot(el) { activeSlot = el; document.getElementById('slotInput').click(); }

        const loadImg = (file, target, sync = false) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const src = e.target.result;
                if(sync) {
                    isSyncMode = true;
                    syncedData.src = src;
                    document.querySelectorAll('.slot').forEach(s => applyImgToSlot(s, src));
                } else {
                    applyImgToSlot(target, src);
                }
            };
            reader.readAsDataURL(file);
        };

        function applyImgToSlot(target, src) {
            const oldWrapper = target.querySelector('.img-wrapper');
            if (oldWrapper) oldWrapper.remove();
            target.querySelector('.click-area').style.display = 'none';
            const wrapper = document.createElement('div');
            wrapper.className = 'img-wrapper resize-drag';
            wrapper.style.width = syncedData.width + 'px';
            wrapper.style.height = syncedData.height + 'px';
            wrapper.style.transform = `translate(${syncedData.x}px, ${syncedData.y}px)`;
            wrapper.innerHTML = `<img src="${src}" draggable="false">`;
            target.appendChild(wrapper);
        }

        function changeZoom(btn, factor) {
            if(!isSyncMode) {
                const wrapper = btn.closest('.slot').querySelector('.img-wrapper');
                if(!wrapper) return;
                const w = parseFloat(wrapper.style.width) || 150;
                const h = parseFloat(wrapper.style.height) || 150;
                wrapper.style.width = (w * factor) + 'px';
                wrapper.style.height = (h * factor) + 'px';
            } else {
                syncedData.width *= factor;
                syncedData.height *= factor;
                document.querySelectorAll('.img-wrapper').forEach(w => {
                    w.style.width = syncedData.width + 'px';
                    w.style.height = syncedData.height + 'px';
                });
            }
        }

        function clearSlot(btn) {
            const slot = btn.closest('.slot');
            const wrapper = slot.querySelector('.img-wrapper');
            if(wrapper) wrapper.remove();
            slot.querySelector('.click-area').style.display = 'flex';
        }

        document.getElementById('globalInput').onchange = (e) => {
            if(e.target.files[0]) loadImg(e.target.files[0], null, true);
        };
        
        document.getElementById('slotInput').onchange = (e) => {
            if(e.target.files[0] && activeSlot) loadImg(e.target.files[0], activeSlot, false);
        };

        interact('.resize-drag').draggable({ listeners: { move: (e) => {
            const t = e.target;
            const x = (parseFloat(t.dataset.x)||0)+e.dx;
            const y = (parseFloat(t.dataset.y)||0)+e.dy;
            
            if(isSyncMode) {
                syncedData.x = x; syncedData.y = y;
                document.querySelectorAll('.img-wrapper').forEach(w => {
                    w.style.transform = `translate(${x}px, ${y}px)`;
                    w.dataset.x = x; w.dataset.y = y;
                });
            } else {
                t.style.transform = `translate(${x}px, ${y}px)`;
                t.dataset.x = x; t.dataset.y = y;
            }
        }}});

        document.getElementById('btnPdf').onclick = () => {
            html2pdf().set({
                margin: 0, filename: 'gabarito_producao.pdf',
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            }).from(document.getElementById('canvas-area')).save();
        };

        renderPages();
    </script>
</body>
</html>
